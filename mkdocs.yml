site_name: 莞中人飞跃手册
site_description: 东莞中学校友共建的大学公开指南
site_author: 莞言瓜语
site_url: https://huashanjian.github.io/feiyue-shouce/
repo_url: https://github.com/huashanjian/feiyue-shouce
repo_name: huashanjian/feiyue-shouce
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/overrides
  language: zh
  logo: assets/logo/dongguan-high-school-handbook-mark.svg
  favicon: assets/logo/dongguan-high-school-handbook-mark.svg
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.footer
    - navigation.path
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.instant.progress
    - content.action.edit
    - content.code.copy
    - toc.follow
    - search.highlight
    - search.share
    - search.suggest
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: 切换暗色模式
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: 切换亮色模式
  font:
    text: Noto Sans SC
    code: JetBrains Mono

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  giscus:
    repo: huashanjian/feiyue-shouce
    repo_id: R_kgDOS3L50A
    category: General
    category_id: DIC_kwDOS3L50M4C-7rn
    mapping: pathname
    strict: "0"
    reactions_enabled: "1"
    input_position: bottom
    lang: zh-CN
    loading: lazy

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.blocks.caption
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

